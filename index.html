<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmotionFact Studio | Dashboard</title>
    <meta name="tiktok-verification" content="tiktok-developers-site-verification=KctXJW0TOXKjmWN6x7EQzW6S8qtiVFnh">
    <meta name="google-site-verification" content="x721azbBy6zgvunsH9nVsLwUzGqL3HzpB9UU_USRzpI">
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; color: #333; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 500px; width: 100%; text-align: center; }
        h1 { color: #fe2c55; } /* TikTok Pink */
        .btn-tiktok { background-color: #000; color: white; padding: 12px 24px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; width: 100%; margin: 20px 0; }
        .upload-zone { border: 2px dashed #ccc; padding: 30px; border-radius: 8px; margin-top: 20px; cursor: pointer; }
        .upload-zone:hover { border-color: #fe2c55; }
        .footer-links { margin-top: 30px; font-size: 12px; }
        a { color: #666; text-decoration: none; margin: 0 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>EmotionFact Studio</h1>
    <p>Manage and post your educational content.</p>

    <button class="btn-tiktok" onclick="alert('Redirecting to TikTok Login...')">
        Log in with TikTok
    </button>

    <hr>

    <div class="upload-zone" onclick="document.getElementById('videoFile').click()">
        <strong>Click to select educational video</strong>
        <p>(MP4, MOV supported)</p>
        <input type="file" id="videoFile" style="display:none" accept="video/*">
    </div>

    <button id="postBtn" style="margin-top:20px; padding: 10px 20px; background: #fe2c55; color:white; border:none; border-radius:5px; cursor:pointer; display:none;" onclick="simulateUpload()">
        Post to TikTok
    </button>
</div>

<div class="footer-links">
    <a href="privacy.html">Privacy Policy</a>
    <a href="terms.html">Terms of Service</a>
</div>

<script>
    // Simulare pentru video demo
    document.getElementById('videoFile').onchange = function() {
        if(this.files.length > 0) {
            alert("Video selected: " + this.files.name);
            document.getElementById('postBtn').style.display = 'inline-block';
        }
    };

    function simulateUpload() {
        let btn = document.getElementById('postBtn');
        btn.innerText = "Uploading... 0%";
        let progress = 0;
        let interval = setInterval(() => {
            progress += 25;
            btn.innerText = "Uploading... " + progress + "%";
            if(progress >= 100) {
                clearInterval(interval);
                btn.style.backgroundColor = "#4CAF50";
                btn.innerText = "Success! Published on TikTok";
                alert("The video has been successfully posted via TikTok Content Posting API!");
            }
        }, 800);
    }
</script>

</body>
</html>
